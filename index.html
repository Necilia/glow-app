<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Aesthetic </title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    
</head>
<body>
    <main>
        <section id="intro">
            <h1 id="logo">Glow_</h1> <!---apresentação do app que vai se transformar em Glow. -->
            <p>Becoming her.</p>
        </section>
       
        <section id="dashboard">
            <h2>Ready to glow today?</h2>
            <p>Consistency creates transformation.</p>

            <div class="input-container">
                <input id="habit-input" type="text" placeholder="Add a new habit...">
                <button id="add-btn">+</button>
            </div>
            

            <div class="cards-container">
                <div class="card"> <h3>💧 Water</h3>
                    <p>Stay hydrated.</p>
                </div>
                
                <div class="card"> <h3>💪 Workout</h3>
                   <p>Stay strong.</p>
                   </div>

                   <div class="card">
                    <h3>🌙 Sleep</h3>
                    <p>Rest and recharge</p>
                   </div>

                   <div class="card">
                    <h3>📚 Study</h3>
                    <p>Small progress matters.</p>
                   </div>

                   <div class="card">
                    <h3>✨ Skincare</h3>
                    <p>Take care of yourself</p>
                   </div>

                   <div class="card">
                    <h3>💻 Coding</h3>
                    <p>Keep building.</p>
                   </div>

            </div> 
        </section>
    </main>

 
    
    <script src="script.js"></script>
</body>
</html>
